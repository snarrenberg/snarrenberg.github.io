  <h1>The WesterParse Project</h1>
  <p>
    WesterParse is a tool for parsing and analyzing tonal music in the tradition
    of Heinrich Schenker. It accepts scores encoded in MusicXML and evaluates
    melodic lines for their viability as Schenkerian linear structures.
  </p>
  <p>
    <a href="https://westerparse.research-stage.artsci.wustl.edu/">Launch WesterParse</a>
  </p>
